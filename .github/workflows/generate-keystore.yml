name: Generate keystore

# Optionnel. Lancez ce workflow UNE SEULE FOIS (onglet Actions > Generate keystore
# > Run workflow) si vous voulez RESTREINDRE la clé Google Maps à votre application
# (package + empreinte SHA-1). Téléchargez ensuite l'artefact "hna-hofra-keystore",
# placez le fichier dans keystore/hnahofra.jks et commitez-le.

on:
  workflow_dispatch:

jobs:
  keystore:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore hnahofra.jks \
            -alias hnahofra \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass hnahofra123 -keypass hnahofra123 \
            -dname "CN=HnaHofra, OU=App, O=HnaHofra, L=Safi, ST=Safi, C=MA"

      - name: Show SHA-1 / SHA-256 fingerprints
        run: |
          echo "================ EMPREINTES (pour restreindre la clé Maps) ================"
          keytool -list -v -keystore hnahofra.jks -alias hnahofra -storepass hnahofra123 | grep -E "SHA1:|SHA256:"
          echo "Package name : com.hnahofra.app"
          echo "=========================================================================="

      - name: Upload keystore
        uses: actions/upload-artifact@v4
        with:
          name: hna-hofra-keystore
          path: hnahofra.jks
          if-no-files-found: error
